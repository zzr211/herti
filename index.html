<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HERTI · 她的人格地图</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Noto+Serif+SC:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">

  <!-- ============ COVER ============ -->
  <div class="cover" id="cover">
    <div class="cover-top">
      <div class="cover-logo">HERTI</div>
      <div class="cover-sub">— a literary personality map —</div>
    </div>
    
    <div>
      <div class="cover-title">HERTI</div>
      <div class="cover-cn-title">她 的 人 格 地 图</div>
      
      <div class="cover-tagline">
        历史隐藏了她们,<br>
        但你的灵魂里,有一块碎片,<br>
        正<em>以她的频率震动</em>。
      </div>
      
      <div class="ornament">· · ·</div>
      
      <div class="cover-meta">16 位女性 · 20 道题 · 约 5 分钟</div>
    </div>
    
    <div class="cover-bottom">
      <button class="start-btn" onclick="startQuiz()">开 始 测 试</button>
      <div class="start-hint">请在安静的时刻打开</div>
      <div id="coverCreditsMount" class="cover-credits-mount" aria-label="出处与维护"></div>
    </div>
  </div>

  <!-- ============ QUIZ ============ -->
  <div class="quiz" id="quiz">
    <div class="quiz-header">
      <div class="quiz-section" id="quizSection">日常的你</div>
      <div class="quiz-progress" id="quizProgress">01 / 20</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width: 5%"></div></div>
    
    <div class="question-num" id="questionNum">Question 01</div>
    <div class="question-text" id="questionText"></div>
    <div class="options" id="options"></div>
    
    <button class="back-btn" id="backBtn" onclick="goBack()" style="visibility:hidden;">← 上 一 题</button>
    
    <div class="quiz-foot">HERTI</div>
  </div>

  <!-- ============ LOADING ============ -->
  <div class="loading" id="loading">
    <div class="loading-text" id="loadingText">
      正在为你寻找<br>
      与你共振的那一位……
    </div>
    <div class="loading-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- ============ RESULT ============ -->
  <div class="result" id="result"></div>

</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>

</body>
</html>
